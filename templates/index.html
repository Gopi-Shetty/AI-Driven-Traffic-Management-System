<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .intro-text {
            text-align: center;
            margin-bottom: 30px;
            color: #666;
            line-height: 1.6;
        }
        .method-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .method-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .method-card:hover {
            border-color: #007bff;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .method-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: #007bff;
        }
        .method-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        .method-desc {
            color: #666;
            font-size: 14px;
            line-height: 1.4;
        }
        .submit-btn {
            background-color: #28a745;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
            margin-top: 20px;
            display: none; /* Hide the button initially */
        }
        .submit-btn:hover {
            background-color: #218838;
        }
        .hidden-radio {
            display: none;
        }
        .selected {
            background-color: #e6f2ff;
            border-color: #007bff;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>Traffic Management System</h1>
        
        <div class="intro-text">
            <p>Welcome to the Traffic Management System. This system helps optimize traffic signal timings based on vehicle density analysis. 
               Choose one of the following methods to upload or capture traffic data.</p>
        </div>
        
        <form id="upload-form" action="/select_upload_method" method="POST">
            <input type="hidden" id="upload_method" name="upload_method" value="">
            
            <div class="method-grid">
                <label class="method-card" onclick="selectMethod('image')">
                    <input type="radio" name="method_select" value="image" class="hidden-radio">
                    <div class="method-icon">
                        <i class="fas fa-image"></i>
                    </div>
                    <div class="method-title">Upload Images</div>
                    <div class="method-desc">Upload image files of traffic from your device for each junction's incoming and outgoing traffic.</div>
                </label>
                
                <label class="method-card" onclick="selectMethod('video')">
                    <input type="radio" name="method_select" value="video" class="hidden-radio">
                    <div class="method-icon">
                        <i class="fas fa-video"></i>
                    </div>
                    <div class="method-title">Upload Videos</div>
                    <div class="method-desc">Upload video files of traffic from your device for each junction's incoming and outgoing traffic.</div>
                </label>
                
                <label class="method-card" onclick="selectMethod('webcam_image')">
                    <input type="radio" name="method_select" value="webcam_image" class="hidden-radio">
                    <div class="method-icon">
                        <i class="fas fa-camera"></i>
                    </div>
                    <div class="method-title">Capture Images</div>
                    <div class="method-desc">Use your webcam to capture images for each junction's incoming and outgoing traffic.</div>
                </label>
                
                <label class="method-card" onclick="selectMethod('webcam_video')">
                    <input type="radio" name="method_select" value="webcam_video" class="hidden-radio">
                    <div class="method-icon">
                        <i class="fas fa-video-camera"></i>
                    </div>
                    <div class="method-title">Record Videos</div>
                    <div class="method-desc">Use your webcam to record videos for each junction's incoming and outgoing traffic.</div>
                </label>
            </div>
            
            <button type="submit" id="continue-btn" class="submit-btn">Continue</button>
        </form>
    </div>
    
    <script>
        // Show the button and set the selected method
        function selectMethod(method) {
            // Set the hidden input value
            document.getElementById('upload_method').value = method;
            
            // Show the submit button
            document.getElementById('continue-btn').style.display = 'block';
            
            // Mark the selected card
            const cards = document.querySelectorAll('.method-card');
            cards.forEach(card => {
                card.classList.remove('selected');
            });
            
            // Find and select the clicked card
            const selectedCard = document.querySelector(`.method-card input[value="${method}"]`).parentNode;
            selectedCard.classList.add('selected');
        }
    </script>
</body>
</html>
