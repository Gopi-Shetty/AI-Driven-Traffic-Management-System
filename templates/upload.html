<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Management - Upload Images</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .upload-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .upload-item {
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .upload-item:hover {
            border-color: #007bff;
        }
        .upload-label {
            display: block;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        .upload-preview {
            width: 100%;
            height: 200px;
            background-color: #f9f9f9;
            margin-bottom: 15px;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }
        .preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .upload-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .upload-btn:hover {
            background-color: #0056b3;
        }
        .submit-container {
            margin-top: 30px;
            text-align: center;
        }
        .submit-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .submit-btn:hover {
            background-color: #218838;
        }
        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Traffic Management System - Image Upload</h1>
        
        <div class="info-text">
            Please upload traffic images for junctions: 
            {% for side in unvisited_sides %}
                <strong>{{ side.upper() }}</strong>{% if not loop.last %}, {% endif %}
            {% endfor %}
        </div>
        
        <form action="/upload" method="POST" enctype="multipart/form-data" class="upload-form">
            {% for side in unvisited_sides %}
            <div class="upload-item">
                <span class="upload-label">Junction {{ side.upper() }}</span>
                <div class="upload-preview">
                    <img class="preview-img" id="preview-{{ side }}" src="#" alt="Preview">
                </div>
                <input type="file" name="image_{{ side }}" id="image_{{ side }}" accept=".jpg,.jpeg,.png" onchange="previewImage(this, '{{ side }}')">
            </div>
            {% endfor %}
            
            <div class="submit-container" style="grid-column: 1 / -1;">
                <button type="submit" class="submit-btn">Process Images</button>
            </div>
        </form>
    </div>

    <script>
        function previewImage(input, side) {
            const preview = document.getElementById(`preview-${side}`);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
